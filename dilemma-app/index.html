<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#121212">
    <meta name="author" content="Nebo99447-lgtm">
    <meta name="creator" content="Nebo99447-lgtm">
    <title>Две Дилеммы</title>
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --surface2: #2a2a2a;
            --text: #fff;
            --text2: #aaa;
            --gold: #ffd700;
            --side-a: #007aff;
            --side-a-light: rgba(0,122,255,0.15);
            --side-a-border: rgba(0,122,255,0.4);
            --side-b: #ff2d55;
            --side-b-light: rgba(255,45,85,0.15);
            --side-b-border: rgba(255,45,85,0.4);
        }
        .light-theme {
            --bg: #f2f2f7;
            --surface: #ffffff;
            --surface2: #e5e5ea;
            --text: #1c1c1e;
            --text2: #636366;
            --gold: #ff9500;
            --side-a: #007aff;
            --side-a-light: rgba(0,122,255,0.1);
            --side-a-border: rgba(0,122,255,0.5);
            --side-b: #ff3b30;
            --side-b-light: rgba(255,59,48,0.1);
            --side-b-border: rgba(255,59,48,0.5);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            background:var(--bg);
            color:var(--text);
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            text-align:center;
            transition:background 0.3s;
            overflow-x:hidden;
            -webkit-tap-highlight-color:transparent;
            user-select:none;
        }
        .fullscreen-container{display:flex;justify-content:center;align-items:center;width:100%;min-height:100vh;padding:20px}
        .login-box{background:var(--surface);padding:30px;border-radius:20px;width:90%;max-width:400px;position:relative}
        .login-box h1{color:var(--side-a);margin-bottom:15px;font-size:2.2em;cursor:pointer}
        .login-box p{color:var(--text2);margin-bottom:15px;font-size:0.9em;line-height:1.4}
        .login-box input{width:100%;padding:15px;margin-bottom:12px;border-radius:10px;border:none;background:var(--surface2);color:var(--text);font-size:1.1em}
        .login-box button{background:var(--side-a);border:none;color:#fff;padding:15px 30px;font-size:1.1em;border-radius:50px;width:100%;cursor:pointer;font-weight:700;margin-bottom:8px}
        .error-message{color:var(--side-b);margin-top:8px;min-height:20px;font-size:0.9em}
        .success-message{color:#34c759;margin-top:8px;min-height:20px;font-size:0.9em}
        .made-by{margin-top:20px;font-size:0.85em;color:var(--text2);letter-spacing:1px;opacity:0.8}
        .made-by strong{color:var(--gold);font-weight:700}
        .tab-buttons{display:flex;gap:0;margin-bottom:15px}
        .tab-btn{flex:1;padding:12px;background:transparent;border:none;color:var(--text2);cursor:pointer;font-weight:700;border-bottom:3px solid transparent;transition:.2s;font-size:1em}
        .tab-btn.active{color:var(--side-a);border-bottom-color:var(--side-a)}
        .header{position:fixed;top:0;left:0;right:0;padding:8px 15px;background:rgba(0,0,0,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:10;display:flex;align-items:center;justify-content:space-between;font-weight:700;color:var(--gold);gap:6px;flex-wrap:wrap}
        .icon-btn{background:0 0;border:none;font-size:1.3em;cursor:pointer;padding:5px;position:relative}
        .notification-badge{position:absolute;top:0;right:0;background:var(--side-b);color:#fff;font-size:.6em;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
        .streak-badge{background:linear-gradient(135deg,#ff9500,#ff5e00);color:#fff;padding:4px 10px;border-radius:15px;font-size:.8em;animation:glow 2s infinite}
        @keyframes glow{0%,100%{box-shadow:0 0 5px rgba(255,149,0,0.5)}50%{box-shadow:0 0 15px rgba(255,149,0,0.8)}}
        .search-container{padding:70px 15px 10px}
        #searchInput{width:100%;padding:12px 16px;border-radius:25px;border:1px solid var(--surface2);background:var(--surface);color:var(--text);font-size:.95em;outline:0}
        #searchInput:focus{border-color:var(--side-a);box-shadow:0 0 0 3px var(--side-a-light)}
        .categories{display:flex;gap:8px;overflow-x:auto;overflow-y:hidden;padding:10px 15px;scrollbar-width:thin;-webkit-overflow-scrolling:touch;white-space:nowrap;flex-wrap:nowrap;cursor:grab}
        .categories:active{cursor:grabbing}
        .categories::-webkit-scrollbar{display:block;height:4px}
        .categories::-webkit-scrollbar-track{background:var(--surface);border-radius:2px}
        .categories::-webkit-scrollbar-thumb{background:var(--side-a);border-radius:2px}
        .category-btn{background:var(--surface);border:1px solid var(--surface2);color:var(--text);padding:8px 16px;border-radius:20px;font-size:.80em;white-space:nowrap;cursor:pointer;transition:.2s;flex-shrink:0;display:inline-block;user-select:none}
        .category-btn.active{background:var(--side-a);border-color:var(--side-a);color:#fff}
        #swipeContainer{touch-action:pan-y}
        #appScreen{width:100%;max-width:500px;padding-bottom:80px}
        #question{font-size:1.6em;font-weight:700;margin:10px 20px 15px;text-shadow:1px 1px 5px rgba(0,0,0,0.3);min-height:50px;line-height:1.3}
        .category-badge{display:inline-block;background:var(--surface2);padding:4px 12px;border-radius:10px;font-size:.75em;color:var(--text2)}
        .choices{display:flex;flex-direction:column;gap:12px;margin-bottom:15px;padding:0 15px}
        .choice-btn{border-radius:18px;padding:18px 14px;color:var(--text);font-size:1em;font-weight:700;cursor:pointer;transition:.2s;text-align:left;border:2px solid transparent;position:relative;z-index:1}
        #optionA{background:var(--side-a-light);border-color:var(--side-a-border)}
        #optionA:active{background:rgba(0,122,255,0.3);transform:scale(0.97)}
        #optionA:disabled{cursor:not-allowed;opacity:.7;pointer-events:none}
        #optionB{background:var(--side-b-light);border-color:var(--side-b-border)}
        #optionB:active{background:rgba(255,45,85,0.3);transform:scale(0.97)}
        #optionB:disabled{cursor:not-allowed;opacity:.7;pointer-events:none}
        .choice-text{display:block;margin-bottom:8px;font-size:1.1em;pointer-events:none}
        .vote-info{display:flex;justify-content:space-between;align-items:center;pointer-events:none}
        .vote-count{font-size:.85em;color:var(--text2)}
        .percentage{font-size:1.2em;color:var(--gold);font-weight:700}
        .progress-bar{height:5px;background:rgba(255,255,255,0.1);border-radius:3px;margin-top:8px;overflow:hidden}
        .progress-fill{height:100%;border-radius:3px;transition:width .6s}
        #progressA{background:var(--side-a)}
        #progressB{background:var(--side-b)}
        .or-divider{font-size:.9em;color:var(--text2);letter-spacing:3px;background:var(--bg);padding:4px;border-radius:10px;align-self:center;width:50px}
        .action-buttons{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;padding:0 15px}
        #showCommentsBtn,#nextBtn,#shareBtn{border:none;color:#fff;padding:10px 18px;font-size:.9em;font-weight:700;border-radius:50px;cursor:pointer;transition:.2s}
        #showCommentsBtn{background:var(--side-a)}
        #nextBtn{background:var(--side-b)}
        #shareBtn{background:#34c759}
        #commentForm{padding:0 15px;margin-top:15px}
        #newCommentInput,#replyInput,#questionInput,#optionAInput,#optionBInput{width:100%;padding:12px;border-radius:10px;border:1px solid var(--surface2);background:var(--surface);color:var(--text);font-size:.95em;margin-bottom:8px;resize:vertical;font-family:inherit}
        #submitCommentBtn,#submitReplyBtn{background:var(--side-a);border:none;color:#fff;padding:10px 20px;border-radius:20px;cursor:pointer;font-weight:700}
        .comments-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
        .comments-header h3{margin:0;color:var(--gold);font-size:1.1em}
        .sort-buttons{display:flex;gap:4px}
        .sort-btn{background:var(--surface2);border:none;color:var(--text2);padding:5px 10px;border-radius:15px;font-size:.75em;cursor:pointer;transition:.2s}
        .sort-btn.active{background:var(--side-a);color:#fff}
        #commentsSection{background:var(--surface);border-radius:18px;padding:15px;margin:15px;text-align:left;max-height:50vh;overflow-y:auto}
        .comment-item{border-radius:12px;margin-bottom:10px;padding:10px 12px;transition:.2s;position:relative}
        .comment-item.choice-a{background:var(--side-a-light);border:1px solid var(--side-a-border);border-left:4px solid var(--side-a)}
        .comment-item.choice-b{background:var(--side-b-light);border:1px solid var(--side-b-border);border-left:4px solid var(--side-b)}
        .comment-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:.85em}
        .comment-user-info{display:flex;align-items:center;gap:8px}
        .avatar-small{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:.7em;color:#fff;flex-shrink:0}
        .comment-author{font-weight:700;color:var(--gold);cursor:pointer}
        .comment-choice-badge{font-size:.75em;padding:2px 8px;border-radius:10px;font-weight:700}
        .comment-item.choice-a .comment-choice-badge{background:var(--side-a);color:#fff}
        .comment-item.choice-b .comment-choice-badge{background:var(--side-b);color:#fff}
        .comment-text{margin:6px 0;word-break:break-word;line-height:1.4;font-size:.95em}
        .comment-actions{display:flex;gap:15px;margin-top:8px;font-size:.85em;align-items:center}
        .like-btn,.reply-btn,.delete-btn{background:0 0;border:none;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:12px;transition:.2s;font-size:.85em}
        .like-btn:hover,.reply-btn:hover{background:rgba(255,255,255,0.1)}
        .like-btn.liked{color:var(--side-b)}
        .delete-btn{color:#ff3b30;margin-left:auto}
        .delete-btn:hover{background:rgba(255,59,48,0.2)}
        .ban-btn{background:rgba(255,0,0,0.2)!important;color:#f44!important;margin-left:4px!important}
        .ban-btn:hover{background:rgba(255,0,0,0.4)!important}
        .replies-container{margin-top:8px;margin-left:12px;border-left:2px solid var(--surface2);padding-left:12px}
        .reply-item{background:var(--surface);border-radius:8px;padding:6px 10px;margin-bottom:6px;font-size:.85em;position:relative}
        .reply-item .delete-btn{font-size:.7em;padding:2px 4px}
        .reply-author{font-weight:700;color:var(--gold);cursor:pointer}
        .dilemma-card{background:var(--surface);border-radius:12px;padding:12px;margin-bottom:10px;cursor:pointer;transition:.2s;text-align:left;border:1px solid var(--surface2)}
        .dilemma-card:hover{border-color:var(--side-a);transform:translateY(-1px)}
        .dilemma-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
        .dilemma-card-category{font-size:.75em;color:var(--text2);background:var(--surface2);padding:2px 8px;border-radius:10px}
        .dilemma-card-votes{font-size:.8em;color:var(--gold)}
        .dilemma-card-question{font-weight:700;font-size:.95em;margin-bottom:8px;color:var(--text)}
        .dilemma-card-options{display:flex;gap:8px}
        .dilemma-option{flex:1;font-size:.8em;padding:6px 10px;border-radius:8px;text-align:center}
        .option-a{background:var(--side-a-light);color:var(--side-a)}
        .option-b{background:var(--side-b-light);color:var(--side-b)}
        #profileScreen,#createScreen,#userProfileScreen{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:20;overflow-y:auto}
        .profile-header{display:flex;align-items:center;gap:12px;padding:12px 15px;background:var(--surface);position:sticky;top:0;z-index:1}
        .profile-header h2{font-size:1.1em}
        .profile-content{padding:20px;text-align:center}
        .avatar-large{width:80px;height:80px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:2em;color:#fff;margin:15px 0}
        .streak-info{margin:8px 0;font-size:1.1em}
        .subscribe-btn,.unsubscribe-btn{border:none;color:#fff;padding:10px 25px;border-radius:50px;cursor:pointer;font-weight:700;font-size:.95em;margin:8px;transition:.2s}
        .subscribe-btn{background:var(--side-a)}
        .unsubscribe-btn{background:var(--side-b)}
        .subscribers-count{color:var(--text2);font-size:.9em;margin:5px 0}
        .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:20px 0}
        .stat-card{background:var(--surface);padding:18px;border-radius:15px}
        .stat-value{font-size:1.8em;font-weight:700;color:var(--side-a);display:block}
        .stat-label{font-size:.8em;color:var(--text2)}
        .subscriptions-list,.subscribers-list{text-align:left;margin-top:20px}
        .subscriptions-list h4,.subscribers-list h4{color:var(--gold);margin-bottom:10px}
        .subscription-item{display:flex;align-items:center;gap:10px;padding:10px;background:var(--surface);border-radius:12px;margin-bottom:8px;cursor:pointer;transition:.2s}
        .subscription-item:hover{background:var(--surface2)}
        .subscription-item .avatar-small{width:36px;height:36px;font-size:.9em}
        .subscription-name{font-weight:700;color:var(--text)}
        .leaderboard{background:var(--surface);border-radius:15px;padding:15px;margin-top:20px;text-align:left}
        .leaderboard h4{color:var(--gold);margin-bottom:10px;text-align:center}
        .leaderboard-item{display:flex;align-items:center;gap:10px;padding:8px;border-radius:8px;margin-bottom:5px}
        .leaderboard-rank{font-weight:700;font-size:1.2em;width:30px;text-align:center}
        .leaderboard-rank.gold{color:#ffd700}
        .leaderboard-rank.silver{color:#c0c0c0}
        .leaderboard-rank.bronze{color:#cd7f32}
        .logout-btn{background:var(--side-b);border:none;color:#fff;padding:12px 40px;border-radius:20px;cursor:pointer;font-size:.95em;margin-top:15px}
        .create-form{padding:20px;max-width:500px;margin:0 auto}
        .create-form input,.create-form select,.create-form textarea{width:100%;padding:14px;margin-bottom:12px;border-radius:10px;border:1px solid var(--surface2);background:var(--surface);color:var(--text);font-size:.95em;font-family:inherit}
        #createDilemmaBtn{background:var(--side-a);border:none;color:#fff;padding:14px 30px;border-radius:50px;width:100%;cursor:pointer;font-weight:700;font-size:1.1em}
        .fab{position:fixed;bottom:20px;right:20px;width:56px;height:56px;border-radius:50%;background:var(--side-a);color:#fff;border:none;font-size:1.5em;cursor:pointer;box-shadow:0 4px 20px rgba(0,122,255,0.5);z-index:15;transition:.2s}
        .fab:active{transform:scale(0.85)}
        .modal{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top-left-radius:20px;border-top-right-radius:20px;padding:20px;z-index:100;box-shadow:0 -5px 30px rgba(0,0,0,0.5);animation:slideUpModal .3s}
        @keyframes slideUpModal{from{transform:translateY(100%)}to{transform:translateY(0)}}
        .modal-content{text-align:left}
        .close-modal{float:right;font-size:1.5em;cursor:pointer;color:var(--text2)}
        #confettiCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999}
        .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--surface);color:var(--text);padding:12px 24px;border-radius:50px;font-weight:700;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,0.5);animation:toastIn .3s;white-space:nowrap}
        @keyframes toastIn{from{transform:translateX(-50%) translateY(100px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
        @keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.03)}100%{transform:scale(1)}}
        .pulse{animation:pulse .3s}
        ::-webkit-scrollbar{width:4px}
        ::-webkit-scrollbar-track{background:0 0}
        ::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:2px}
        .swipe-hint{color:var(--text2);font-size:.8em;margin-top:20px}
        @media(max-width:360px){#question{font-size:1.3em}.choice-text{font-size:1em}.choice-btn{padding:14px 10px}.header{padding:6px 10px}}
        @media(min-width:768px){#appScreen{max-width:600px}#question{font-size:2em}}
    </style>
</head>
<body>

    <div id="loginScreen" class="fullscreen-container">
        <div class="login-box">
            <h1>🚀 Две Дилеммы</h1>
            <div class="tab-buttons">
                <button class="tab-btn active" id="tabLogin">Войти</button>
                <button class="tab-btn" id="tabRegister">Регистрация</button>
            </div>
            <div id="loginForm">
                <input type="text" id="loginUsername" placeholder="Никнейм" maxlength="20" autocomplete="off">
                <input type="password" id="loginPassword" placeholder="Пароль" maxlength="30">
                <button id="loginBtn" type="button">Войти</button>
                <p id="loginError" class="error-message"></p>
            </div>
            <div id="registerForm" style="display:none;">
                <input type="text" id="regUsername" placeholder="Придумай никнейм" maxlength="20" autocomplete="off">
                <input type="password" id="regPassword" placeholder="Придумай пароль (мин 4 символа)" maxlength="30">
                <input type="password" id="regPasswordConfirm" placeholder="Повтори пароль" maxlength="30">
                <button id="registerBtn" type="button">Создать аккаунт</button>
                <p id="regError" class="error-message"></p>
                <p id="regSuccess" class="success-message"></p>
            </div>
            <p class="made-by">⚡ Сделано <strong>Nebo</strong></p>
        </div>
    </div>

    <div id="appScreen" style="display: none;">
        <div class="header">
            <button id="profileBtn" class="icon-btn">👤</button>
            <button id="langToggle" class="icon-btn">🇷🇺</button>
            <span id="streakBadge" class="streak-badge">🔥 0 дн.</span>
            <button id="notificationsBtn" class="icon-btn" style="position:relative;">🔔<span id="notificationBadge" class="notification-badge" style="display:none;">0</span></button>
            <button id="themeToggle" class="icon-btn">🌙</button>
            <span id="currentUsernameDisplay"></span>
        </div>
        <div class="search-container"><input type="text" id="searchInput" placeholder="🔍 Поиск..." autocomplete="off"></div>
        <div class="categories">
            <button class="category-btn active" data-category="all">Все</button>
            <button class="category-btn" data-category="games">🎮 Игры</button>
            <button class="category-btn" data-category="relationships">💕 Отношения</button>
            <button class="category-btn" data-category="food">🍕 Еда</button>
            <button class="category-btn" data-category="movies">🎬 Фильмы</button>
            <button class="category-btn" data-category="battles">⚔️ Кто кого</button>
            <button class="category-btn" data-category="beauty">👑 Кто красивее</button>
        </div>
        <div id="swipeContainer"><div id="app">
            <span class="category-badge" id="categoryBadge"></span>
            <h1 id="question">Загрузка...</h1>
            <div class="choices">
                <button id="optionA" class="choice-btn"><span class="choice-text" id="textA"></span><div class="vote-info"><span class="vote-count" id="countA"></span><div class="percentage" id="percentA">0%</div></div><div class="progress-bar"><div class="progress-fill" id="progressA" style="width:0%"></div></div></button>
                <div class="or-divider">VS</div>
                <button id="optionB" class="choice-btn"><span class="choice-text" id="textB"></span><div class="vote-info"><span class="vote-count" id="countB"></span><div class="percentage" id="percentB">0%</div></div><div class="progress-bar"><div class="progress-fill" id="progressB" style="width:0%"></div></div></button>
            </div>
            <div class="action-buttons">
                <button id="showCommentsBtn" style="display:none;">💬 (<span id="commentCount">0</span>)</button>
                <button id="shareBtn" style="display:none;">📤</button>
            </div>
            <div id="commentForm" style="display:none;"><textarea id="newCommentInput" placeholder="Комментарий... (Enter = отправить)" maxlength="200" rows="2"></textarea><button id="submitCommentBtn">Отправить</button></div>
            <div id="commentsSection" style="display:none;"><div class="comments-header"><h3>Комментарии</h3><div class="sort-buttons"><button class="sort-btn active" data-sort="new">Новые</button><button class="sort-btn" data-sort="popular">Популярные</button></div></div><div id="commentsList"></div></div>
            <button id="nextBtn" style="display:none;">Далее →</button>
            <p class="swipe-hint">Enter = далее | A/D = голос | Стрелки = навигация</p>
        </div></div>
    </div>

    <div id="profileScreen" style="display:none;"><div class="profile-header"><button id="backBtn" class="icon-btn">←</button><h2>Профиль</h2></div><div class="profile-content"><div class="avatar-large" id="profileAvatar"></div><h3 id="profileUsername"></h3><p class="streak-info" id="profileStreak"></p><p class="subscribers-count" id="subsCount"></p><div class="stats-grid"><div class="stat-card"><span class="stat-value" id="totalVotes">0</span><span class="stat-label">Решено</span></div><div class="stat-card"><span class="stat-value" id="totalComments">0</span><span class="stat-label">Комментов</span></div></div><button id="logoutBtn" class="logout-btn">Выйти</button></div></div>
