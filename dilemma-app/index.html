<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Nebo99447-lgtm">
    <title>Две Дилеммы</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Две Дилеммы">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%233d6ce6'/><text y='.75em' font-size='70' text-anchor='middle' x='50'>🚀</text></svg>">
    <meta name="theme-color" content="#3d6ce6">
    
    <style>
        :root {
            --bg: #f0f0f5;
            --surface: #ffffff;
            --text: #1a1a2e;
            --text2: #666;
            --gold: #e6a800;
            --side-a: #3d6ce6;
            --side-b: #e63946;
        }
        .theme-blue { --side-a: #3d6ce6; --side-b: #e63946; }
        .theme-green { --side-a: #2ed573; --side-b: #ff4757; }
        .theme-purple { --side-a: #af52de; --side-b: #ff9500; }
        .theme-orange { --side-a: #ff9500; --side-b: #3d6ce6; }
        .theme-pink { --side-a: #ff2d55; --side-b: #af52de; }
        .dark-theme {
            --bg: #121212;
            --surface: #1a1a2e;
            --text: #fff;
            --text2: #aaa;
            --gold: #ffd700;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            transition: 0.3s;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .container { max-width: 600px; margin: 0 auto; }
        input, textarea, select {
            padding: 14px; margin: 5px 0; border-radius: 10px;
            border: none; font-size: 16px; width: 100%; box-sizing: border-box;
            background: var(--surface); color: var(--text);
        }
        button { cursor: pointer; }
        .btn {
            padding: 14px 24px; border: none; color: white; font-size: 16px;
            border-radius: 25px; cursor: pointer; margin: 5px; font-weight: bold;
            transition: 0.2s;
        }
        .btn:active { transform: scale(0.95); }
        .btn-a { background: var(--side-a); }
        .btn-b { background: var(--side-b); }
        .btn-g { background: #2ed573; }
        .btn-y { background: #ff9500; }
        .choice-btn {
            width: 100%; padding: 25px; margin: 10px 0; border-radius: 15px;
            border: 3px solid var(--side-a); background: rgba(61,108,230,0.1);
            color: var(--text); font-size: 18px; cursor: pointer; text-align: center;
            transition: 0.3s;
        }
        .choice-btn-b { border-color: var(--side-b); background: rgba(230,57,70,0.1); }
        .choice-btn:disabled { cursor: not-allowed; opacity: 0.7; }
        .percentage { font-size: 22px; color: var(--gold); font-weight: bold; margin-top: 8px; }
        
        /* КАТЕГОРИИ С ПОЛЗУНКОМ */
        .categories-wrapper {
            position: relative;
            margin: 15px 0;
        }
        .categories {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 30px;
            scroll-behavior: smooth;
            scrollbar-width: thin;
            scrollbar-color: var(--side-a) transparent;
        }
        .categories::-webkit-scrollbar {
            height: 6px;
        }
        .categories::-webkit-scrollbar-track {
            background: transparent;
            border-radius: 3px;
        }
        .categories::-webkit-scrollbar-thumb {
            background: var(--side-a);
            border-radius: 3px;
        }
        .scroll-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--surface);
            border: 2px solid var(--side-a);
            color: var(--side-a);
            font-size: 14px;
            cursor: pointer;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .scroll-arrow:hover {
            background: var(--side-a);
            color: white;
        }
        .scroll-arrow-left { left: 0; }
        .scroll-arrow-right { right: 0; }
        .cat-btn {
            background: var(--surface);
            border: 2px solid #ddd;
            color: var(--text);
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 14px;
            font-weight: 600;
            flex-shrink: 0;
            transition: 0.2s;
        }
        .cat-btn.active { background: var(--side-a); border-color: var(--side-a); color: #fff; }
        .cat-btn:hover { border-color: var(--side-a); }
        
        .daily-badge {
            background: linear-gradient(135deg, #ff9500, #ff2d55);
            color: white; padding: 6px 14px; border-radius: 20px;
            font-size: 13px; font-weight: bold; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
        .header { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
        .tabs { display: flex; margin-bottom: 15px; }
        .tab {
            flex: 1; padding: 12px; background: #e8e8ee; border: none;
            color: #666; cursor: pointer; font-size: 16px;
        }
        .dark-theme .tab { background: #252540; color: #aaa; }
        .tab.active { background: var(--surface); color: var(--side-a); border-radius: 10px; }
        .error { color: var(--side-b); font-size: 14px; min-height: 20px; }
        .made-by { margin-top: 15px; font-size: 13px; color: var(--text2); }
        .made-by strong { color: var(--gold); }
        #commentsSection { background: var(--surface); border-radius: 15px; padding: 15px; text-align: left; max-height: 300px; overflow-y: auto; margin-top: 10px; }
        .comment { padding: 10px; border-radius: 10px; margin: 8px 0; }
        .comment-a { background: rgba(61,108,230,0.1); border-left: 4px solid var(--side-a); }
        .comment-b { background: rgba(230,57,70,0.1); border-left: 4px solid var(--side-b); }
        .comment-author { font-weight: bold; color: var(--gold); }
        .comment-badge { font-size: 12px; padding: 2px 8px; border-radius: 10px; margin-left: 8px; color: white; }
        .badge-a { background: var(--side-a); }
        .badge-b { background: var(--side-b); }
        .reply-item { margin-left: 20px; padding: 6px 10px; background: rgba(0,0,0,0.05); border-radius: 8px; margin-top: 5px; font-size: 14px; border-left: 3px solid var(--side-a); }
        .dark-theme .reply-item { background: rgba(255,255,255,0.05); }
        .key-hint { color: var(--text2); font-size: 12px; margin-top: 15px; }
        #confettiCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--surface); padding: 14px 28px; border-radius: 25px; z-index: 200; font-weight: bold; box-shadow: 0 4px 20px rgba(0,0,0,0.3); animation: toastIn 0.3s ease; white-space: nowrap; }
        @keyframes toastIn { from { transform: translateX(-50%) translateY(100px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
        .stat-card { background: var(--surface); padding: 15px; border-radius: 15px; margin: 5px; }
        .stat-value { font-size: 1.8em; font-weight: bold; color: var(--side-a); }
        .achievement { display: inline-block; background: var(--surface); padding: 8px 14px; border-radius: 20px; margin: 3px; font-size: 14px; border: 1px solid var(--gold); }
        .achievement.earned { background: var(--gold); color: #000; }
        .top-item { display: flex; justify-content: space-between; padding: 8px; background: var(--surface); border-radius: 10px; margin: 5px 0; }
        #createScreen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); z-index: 20; overflow-y: auto; padding: 20px; display: none; }
        .create-form { background: var(--surface); padding: 25px; border-radius: 20px; max-width: 500px; margin: 50px auto; }
        .fab { position: fixed; bottom: 20px; right: 20px; z-index: 10; width: 55px; height: 55px; border-radius: 50%; font-size: 24px; padding: 0; box-shadow: 0 4px 20px rgba(61,108,230,0.5); }
        .lang-btn { background: #888; padding: 8px 14px; font-size: 16px; border-radius: 10px; min-width: 50px; }
        .admin-badge { background: #ff2d55; color: white; padding: 4px 10px; border-radius: 15px; font-size: 12px; }
        .delete-btn { background: #ff2d55; color: white; border: none; padding: 2px 8px; border-radius: 10px; cursor: pointer; font-size: 11px; margin-left: 5px; }
        .admin-login-btn { background: #ffd700; color: #000; padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 14px; }
        .graph-bar { display: flex; align-items: center; gap: 10px; margin: 5px 0; }
        .graph-fill { height: 20px; border-radius: 10px; transition: width 0.8s; }
        .graph-a { background: var(--side-a); }
        .graph-b { background: var(--side-b); }
        .slide-in { animation: slideIn 0.4s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        #achievementsSection { display: none; margin-top: 15px; }
        #duelScreen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); z-index: 25; overflow-y: auto; padding: 20px; display: none; }
        .duel-box { background: var(--surface); padding: 25px; border-radius: 20px; max-width: 500px; margin: 30px auto; text-align: center; }
        .duel-timer { font-size: 4em; font-weight: bold; color: var(--gold); margin: 10px 0; transition: color 0.3s; }
        .duel-timer.urgent { color: #ff4757; animation: pulse 0.5s infinite; }
        .duel-scoreboard { display: flex; justify-content: space-around; align-items: center; margin: 15px 0; padding: 15px; background: rgba(0,0,0,0.05); border-radius: 15px; }
        .dark-theme .duel-scoreboard { background: rgba(255,255,255,0.05); }
        .duel-player { text-align: center; flex: 1; }
        .duel-player-name { font-weight: bold; font-size: 1.1em; margin-bottom: 5px; }
        .duel-player-score { font-size: 2em; font-weight: bold; }
        .duel-player-score.player-score { color: var(--side-a); }
        .duel-player-score.enemy-score { color: var(--side-b); }
        .duel-vs { font-size: 1.5em; font-weight: bold; color: var(--text2); margin: 0 15px; }
        .duel-round { font-size: 1em; color: var(--text2); margin-bottom: 10px; }
        .duel-result-box { background: rgba(0,0,0,0.05); border-radius: 15px; padding: 15px; margin: 15px 0; }
        .dark-theme .duel-result-box { background: rgba(255,255,255,0.05); }
        .theme-selector { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 10px; }
        .theme-dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; }
        .theme-dot.active { border-color: var(--gold); }
        .daily-ranking { background: var(--surface); border-radius: 15px; padding: 15px; margin-top: 20px; text-align: left; }
        .daily-ranking h4 { color: var(--gold); margin: 0 0 10px 0; }
        .ranking-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .dark-theme .ranking-item { border-bottom-color: rgba(255,255,255,0.05); }
        .correct-flash { animation: correctFlash 0.5s ease; }
        .wrong-flash { animation: wrongFlash 0.5s ease; }
        @keyframes correctFlash { 0%,100%{background:rgba(46,213,115,0.1)} 50%{background:rgba(46,213,115,0.4)} }
        @keyframes wrongFlash { 0%,100%{background:rgba(255,71,87,0.1)} 50%{background:rgba(255,71,87,0.4)} }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 2px; }
        
        #searchTypeBtn { transition: 0.3s; white-space: nowrap; }
        .search-user-item {
            display: flex; align-items: center; gap: 12px; padding: 12px; 
            border-radius: 12px; cursor: pointer; margin-bottom: 8px; 
            background: rgba(255,255,255,0.03); transition: 0.2s; 
            border: 1px solid rgba(255,255,255,0.05);
        }
        .search-user-item:hover {
            background: rgba(255,255,255,0.08) !important;
            transform: translateX(4px);
        }
        #searchResults {
            animation: slideDown 0.3s ease;
            background: var(--surface); border-radius: 15px; margin-top: 8px; 
            max-height: 400px; overflow-y: auto; text-align: left; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .stats-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0;
        }
        .duel-progress-bar {
            height: 6px; background: rgba(0,0,0,0.1); border-radius: 3px; 
            margin: 5px 0; overflow: hidden;
        }
        .dark-theme .duel-progress-bar { background: rgba(255,255,255,0.1); }
        .duel-progress-fill {
            height: 100%; border-radius: 3px; transition: width 0.5s ease;
            background: linear-gradient(90deg, var(--side-a), var(--gold));
        }
        .duel-enemy-progress-fill {
            height: 100%; border-radius: 3px; transition: width 0.5s ease;
            background: linear-gradient(90deg, var(--side-b), #ff6b81);
        }
        .duel-answer-reveal {
            display: flex; gap: 10px; margin: 10px 0; justify-content: center;
        }
        .duel-answer-badge {
            padding: 8px 16px; border-radius: 20px; font-size: 0.9em; font-weight: bold;
        }
        .duel-answer-player { background: var(--side-a); color: white; }
        .duel-answer-enemy { background: var(--side-b); color: white; }
    </style>
</head>
<body>
    <canvas id="confettiCanvas"></canvas>

    <div class="container">
        <!-- LOGIN -->
        <div id="loginScreen">
            <h1 style="color:var(--side-a);cursor:pointer" id="secretTitle">🚀 Две Дилеммы</h1>
            <div class="tabs">
                <button class="tab active" id="tabLogin" onclick="switchTab('login')">Войти</button>
                <button class="tab" id="tabRegister" onclick="switchTab('register')">Регистрация</button>
            </div>
            <div id="loginForm">
                <input type="text" id="loginUsername" placeholder="Никнейм" maxlength="20">
                <input type="password" id="loginPassword" placeholder="Пароль" maxlength="30">
                <button class="btn btn-a" onclick="doLogin()">Войти</button>
                <p class="error" id="loginError"></p>
            </div>
            <div id="registerForm" style="display:none">
                <input type="text" id="regUsername" placeholder="Придумай никнейм" maxlength="20">
                <input type="password" id="regPassword" placeholder="Пароль (мин 4)" maxlength="30">
                <input type="password" id="regPasswordConfirm" placeholder="Повтори пароль" maxlength="30">
                <button class="btn btn-a" onclick="doRegister()">Создать аккаунт</button>
                <p class="error" id="regError"></p>
            </div>
            <p class="made-by">⚡ Сделано <strong>Nebo</strong></p>
            <button class="admin-login-btn" onclick="adminQuickLogin()">👑 Войти как Nebo</button>
            <div style="margin-top:10px">
                <button class="btn lang-btn" onclick="cycleLang()">🇷🇺</button>
                <button class="btn" style="background:#888;padding:8px 14px;font-size:16px;border-radius:10px;margin-left:5px" onclick="toggleTheme()">🌙</button>
            </div>
            <div class="theme-selector">
                <div class="theme-dot active" style="background:#3d6ce6" onclick="setColorTheme('blue')"></div>
                <div class="theme-dot" style="background:#2ed573" onclick="setColorTheme('green')"></div>
                <div class="theme-dot" style="background:#af52de" onclick="setColorTheme('purple')"></div>
                <div class="theme-dot" style="background:#ff9500" onclick="setColorTheme('orange')"></div>
                <div class="theme-dot" style="background:#ff2d55" onclick="setColorTheme('pink')"></div>
            </div>
        </div>

        <!-- GAME -->
        <div id="gameScreen" style="display:none">
            <div class="header">
                <button class="btn btn-a" onclick="showProfile()" style="padding:8px 14px;font-size:14px;width:auto">👤 Профиль</button>
                <span class="daily-badge" id="dailyBadge" style="display:none">📅 День</span>
                <span style="color:var(--gold);font-weight:bold" id="userDisplay"></span>
                <span class="admin-badge" id="adminBadge" style="display:none">👑 Админ</span>
                <button class="btn btn-y" onclick="startDuel()" style="padding:8px 14px;font-size:14px;width:auto">⚔️ Дуэль</button>
                <button class="btn btn-b" onclick="toggleTheme()" style="padding:8px 14px;font-size:14px;width:auto">🌙</button>
                <button class="btn lang-btn" onclick="cycleLang()">🇷🇺</button>
            </div>
            
            <div style="padding: 10px 0;">
                <div style="display: flex; gap: 8px; align-items: center;">
                    <input type="text" id="searchInput" placeholder="🔍 Искать дилеммы или игроков..." oninput="doUnifiedSearch()" style="flex: 1;">
                    <button class="btn" id="searchTypeBtn" onclick="toggleSearchType()" style="padding: 10px 14px; font-size: 14px; width: auto; background: var(--side-a); white-space: nowrap;">
                        🎯 Дилеммы
                    </button>
                </div>
                <div id="searchResults" style="display: none;"></div>
            </div>
            
            <!-- КАТЕГОРИИ С ПОЛЗУНКОМ -->
            <div class="categories-wrapper">
                <button class="scroll-arrow scroll-arrow-left" onclick="scrollCategories(-200)">◀</button>
                <div class="categories" id="categoriesContainer">
                    <button class="cat-btn active" data-cat="all" onclick="filterCat('all', this)">Все</button>
                    <button class="cat-btn" data-cat="daily" onclick="filterCat('daily', this)">📅 День</button>
                    <button class="cat-btn" data-cat="relationships" onclick="filterCat('relationships', this)">💕 Отношения</button>
                    <button class="cat-btn" data-cat="games" onclick="filterCat('games', this)">🎮 Игры</button>
                    <button class="cat-btn" data-cat="food" onclick="filterCat('food', this)">🍕 Еда</button>
                    <button class="cat-btn" data-cat="movies" onclick="filterCat('movies', this)">🎬 Фильмы</button>
                    <button class="cat-btn" data-cat="battles" onclick="filterCat('battles', this)">⚔️ Кто кого</button>
                    <button class="cat-btn" data-cat="beauty" onclick="filterCat('beauty', this)">👑 Кто красивее</button>
                    <button class="cat-btn" data-cat="other" onclick="filterCat('other', this)">🤔 Другое</button>
                </div>
                <button class="scroll-arrow scroll-arrow-right" onclick="scrollCategories(200)">▶</button>
            </div>
            
            <h2 id="question"></h2>
            <div id="choicesBox"></div>
            <div id="graphSection" style="display:none;margin:15px 0;text-align:left"></div>
            <div style="margin:10px 0;display:none" id="actionRow">
                <button class="btn btn-a" onclick="toggleComments()" style="width:auto">💬 Комментарии</button>
                <button class="btn btn-g" onclick="shareDilemma()" style="width:auto">📤 Поделиться</button>
            </div>
            <div id="commentForm" style="display:none">
                <textarea id="newCommentInput" placeholder="Твой комментарий..." rows="2"></textarea>
                <button class="btn btn-a" onclick="addComment()" style="width:auto">Отправить</button>
            </div>
            <div id="commentsSection" style="display:none">
                <h3 style="color:var(--gold);margin-top:0">Комментарии</h3>
                <div id="commentsList"></div>
            </div>
            <button class="btn btn-b" id="nextBtn" style="display:none;width:auto" onclick="nextDilemma()">Далее →</button>
            <p class="key-hint">⌨️ Enter — далее | A/D — голос | Enter в комментарии — отправить</p>
            <div id="topSection" style="margin-top:20px;text-align:left"></div>
            <div class="daily-ranking" id="dailyRanking"></div>
        </div>

        <!-- PROFILE -->
        <div id="profileScreen" style="display:none">
            <div class="header">
                <button class="btn btn-a" onclick="closeProfile()" style="padding:8px 14px;font-size:14px;width:auto">← Назад</button>
                <h2>Профиль</h2>
            </div>
            <div id="profileContent"></div>
            <button class="btn btn-a" id="showAchievementsBtn" onclick="toggleAchievements()" style="width:100%;margin-top:10px">🏅 Показать достижения</button>
            <div id="achievementsSection"></div>
            <div id="statsGraph" style="margin-top:15px;text-align:left"></div>
            <button class="btn btn-b" onclick="logout()" style="margin-top:20px;width:100%">🚪 Выйти</button>
        </div>

        <!-- CREATE -->
        <div id="createScreen">
            <div class="create-form">
                <h2>📝 Создать дилемму</h2>
                <select id="createCategory">
                    <option value="relationships">💕 Отношения</option>
                    <option value="games">🎮 Игры</option>
                    <option value="food">🍕 Еда</option>
                    <option value="movies">🎬 Фильмы</option>
                    <option value="battles">⚔️ Кто кого</option>
                    <option value="beauty">👑 Кто красивее</option>
                    <option value="other">🤔 Другое</option>
                </select>
                <input type="text" id="createQuestion" placeholder="Вопрос дилеммы" maxlength="100">
                <input type="text" id="createOptionA" placeholder="Вариант А" maxlength="50">
                <input type="text" id="createOptionB" placeholder="Вариант Б" maxlength="50">
                <button class="btn btn-a" onclick="createDilemma()" style="width:100%">Создать 🚀</button>
                <button class="btn btn-b" onclick="closeCreate()" style="width:100%">Отмена</button>
                <p class="error" id="createError"></p>
            </div>
        </div>

        <!-- ДУЭЛЬ -->
        <div id="duelScreen">

            if (duelData.timeLeft <= 0) { clearInterval(duelData.timerInterval); duelTimeOut(); }
        }, 1000);
    }

    function getEnemyAnswer(question) { var isCorrect = Math.random() < 0.7; if (isCorrect) return question.correct; else return question.correct === 'A' ? 'B' : 'A'; }

    function scheduleEnemyAnswer() {
        var delay = Math.floor(Math.random() * 7000) + 1000;
        setTimeout(function() {
            if (!duelData.active || duelData.roundProcessed) return;
            if (duelData.enemyAnswer !== null) return;
            var d = duelData.rounds[duelData.currentRound];
            duelData.enemyAnswer = getEnemyAnswer(d);
            if (duelData.playerAnswer !== null) { processRound(); }
            else {
                document.getElementById('duelAnswerReveal').style.display = 'flex';
                document.getElementById('duelAnswerReveal').innerHTML = '<span class="duel-answer-badge duel-answer-enemy">🤖 Бот ответил!</span><span style="color: var(--text2); align-self: center;">Ждём вас...</span>';
            }
        }, delay);
    }

    function duelAnswer(ch) {
        if (!duelData.active || duelData.roundProcessed) return;
        if (duelData.playerAnswer !== null) return;
        duelData.playerAnswer = ch; duelData.playerAnswerTime = duelData.timeLeft;
        if (duelData.enemyAnswer === null) {
            document.getElementById('duelAnswerReveal').style.display = 'flex';
            document.getElementById('duelAnswerReveal').innerHTML = '<span class="duel-answer-badge duel-answer-player">😎 Вы ответили!</span><span style="color: var(--text2); align-self: center;">Ждём бота...</span>';
            document.getElementById('duelBtnA').disabled = true; document.getElementById('duelBtnB').disabled = true;
            return;
        }
        processRound();
    }

    function duelTimeOut() {
        if (!duelData.active || duelData.roundProcessed) return;
        if (duelData.playerAnswer === null) { duelData.playerAnswer = 'timeout'; duelData.playerAnswerTime = 0; }
        if (duelData.enemyAnswer === null) { var d = duelData.rounds[duelData.currentRound]; duelData.enemyAnswer = getEnemyAnswer(d); }
        processRound();
    }

    function processRound() {
        if (duelData.roundProcessed) return;
        duelData.roundProcessed = true; clearInterval(duelData.timerInterval);
        var d = duelData.rounds[duelData.currentRound];
        var pAnswer = duelData.playerAnswer; var eAnswer = duelData.enemyAnswer;
        document.getElementById('duelBtnA').disabled = true; document.getElementById('duelBtnB').disabled = true;
        var playerPoints = 0; var enemyPoints = 0;
        if (pAnswer !== 'timeout' && pAnswer === d.correct) { playerPoints = duelData.playerAnswerTime; }
        if (eAnswer === d.correct) { enemyPoints = duelData.timeLeft; }
        duelData.playerScore += playerPoints; duelData.enemyScore += enemyPoints; updateDuelScoreboard();
        if (d.correct === 'A') { document.getElementById('duelBtnA').style.background = '#2ed573'; }
        else { document.getElementById('duelBtnB').style.background = '#2ed573'; }
        var pAnswerText = pAnswer === 'timeout' ? '⏰ Нет ответа' : (pAnswer === 'A' ? d.a : d.b);
        var eAnswerText = eAnswer === 'A' ? d.a : d.b;
        var pIcon = (pAnswer === d.correct) ? '✅' : ((pAnswer === 'timeout') ? '⏰' : '❌');
        var eIcon = (eAnswer === d.correct) ? '✅' : '❌';
        document.getElementById('duelAnswerReveal').style.display = 'flex';
        document.getElementById('duelAnswerReveal').innerHTML = '<span class="duel-answer-badge duel-answer-player">' + pIcon + ' Вы: ' + pAnswerText + ' (+' + playerPoints + ')</span><span class="duel-answer-badge duel-answer-enemy">' + eIcon + ' Бот: ' + eAnswerText + ' (+' + enemyPoints + ')</span>';
        var feedback = document.getElementById('duelFeedback');
        var correctAnswerText = d.correct === 'A' ? d.a : d.b;
        feedback.innerHTML = '<p style="margin:0;">Правильный ответ: <b>' + correctAnswerText + '</b></p>';
        feedback.className = 'duel-result-box'; feedback.style.display = 'block';
        duelData.currentRound++;
        setTimeout(function() { if (duelData.currentRound < duelData.totalRounds) { showDuelRound(); scheduleEnemyAnswer(); } else { endDuel(); } }, 2000);
    }

    function endDuel() {
        clearInterval(duelData.timerInterval); duelData.active = false;
        var ps = duelData.playerScore; var es = duelData.enemyScore;
        document.getElementById('duelRoundText').textContent = 'Дуэль завершена!';
        document.getElementById('duelTimer').textContent = '0'; document.getElementById('duelTimer').classList.remove('urgent');
        document.getElementById('duelQuestion').textContent = '';
        document.getElementById('duelBtnA').style.display = 'none'; document.getElementById('duelBtnB').style.display = 'none';
        document.getElementById('duelAnswerReveal').style.display = 'none';
        var resultHTML = ''; var playerWon = false;
        if (ps >= duelData.targetScore && es >= duelData.targetScore) {
            if (ps > es) { resultHTML = '🏆 <b>Вы победили!</b> Оба набрали 100+, но у вас больше!'; playerWon = true; }
            else if (es > ps) { resultHTML = '😢 <b>Бот победил!</b> Оба набрали 100+, но у бота больше!'; }
            else { resultHTML = '🤝 <b>Ничья!</b> Оба набрали ' + ps + ' очков!'; }
        } else if (ps >= duelData.targetScore) { resultHTML = '🏆 <b>Вы победили!</b> Вы достигли цели в 100 очков!'; playerWon = true; }
        else if (es >= duelData.targetScore) { resultHTML = '😢 <b>Бот победил!</b> Бот достиг цели в 100 очков!'; }
        else {
            if (ps > es) { resultHTML = '🏆 <b>Вы победили!</b> Никто не набрал 100, но у вас больше очков!'; playerWon = true; }
            else if (es > ps) { resultHTML = '😢 <b>Бот победил!</b> Никто не набрал 100, но у бота больше очков!'; }
            else { resultHTML = '🤝 <b>Ничья!</b> У обоих по ' + ps + ' очков!'; }
        }
        document.getElementById('duelFeedback').innerHTML = '<p style="font-size:1.3em;margin:0;">' + resultHTML + '</p><p style="color:var(--text2);margin:10px 0 0 0;">😎 Вы: <b style="color:var(--side-a)">' + ps + '</b> | 🤖 Бот: <b style="color:var(--side-b)">' + es + '</b></p><p style="color:var(--text2);font-size:0.85em;">Цель: ' + duelData.targetScore + ' очков</p>';
        document.getElementById('duelFeedback').style.display = 'block';
        if (currentUser && usersDB[currentUser]) { if (!usersDB[currentUser].bestDuel) usersDB[currentUser].bestDuel = 0; if (ps > usersDB[currentUser].bestDuel) { usersDB[currentUser].bestDuel = ps; saveUsers(); } }
        if (playerWon) { launchConfetti(); playSound('correct'); }
        setTimeout(function() { document.getElementById('duelBtnA').style.display = 'block'; document.getElementById('duelBtnB').style.display = 'block'; }, 2000);
    }

    function closeDuel() {
        clearInterval(duelData.timerInterval); duelData.active = false;
        document.getElementById('duelScreen').style.display = 'none'; document.getElementById('gameScreen').style.display = 'block';
        document.getElementById('duelBtnA').style.display = 'block'; document.getElementById('duelBtnB').style.display = 'block';
        document.getElementById('duelBtnA').style.background = ''; document.getElementById('duelBtnB').style.background = '';
    }

    function toggleComments() { var s = document.getElementById('commentsSection'); s.style.display = s.style.display === 'none' ? 'block' : 'none'; if (s.style.display === 'block') renderComments(); }
    function addComment() { var tx = document.getElementById('newCommentInput').value.trim(); if (!tx) return; var d = filtered[currentIndex]; if (!choices[d.q]) { showToast('Сначала проголосуй!'); return; } var idx = dilemmas.indexOf(d); votes[idx].comments.unshift({ username: currentUser, text: tx, choice: choices[d.q], likes: 0, likedBy: [], time: Date.now(), replies: [] }); saveVotes(); logActivity(); document.getElementById('newCommentInput').value = ''; renderComments(); document.getElementById('commentsSection').style.display = 'block'; }
    function replyToComment(di, ct) { var c = votes[di].comments.find(function(x) { return x.time === ct; }); if (!c) return; var rt = prompt('Ответ:'); if (!rt || !rt.trim()) return; if (!c.replies) c.replies = []; c.replies.push({ username: currentUser, text: rt.trim(), time: Date.now() }); saveVotes(); renderComments(); }

    function renderComments() {
        var d = filtered[currentIndex], idx = dilemmas.indexOf(d), list = document.getElementById('commentsList'); list.innerHTML = '';
        if (!votes[idx].comments.length) { list.innerHTML = '<p style="color:var(--text2)">Нет комментариев</p>'; return; }
        votes[idx].comments.sort(function(a, b) { return b.time - a.time; }).forEach(function(c) {
            var div = document.createElement('div'); div.className = 'comment ' + (c.choice === 'A' ? 'comment-a' : 'comment-b');
            var ct = c.choice === 'A' ? d.a : d.b, bc = c.choice === 'A' ? 'badge-a' : 'badge-b';
            var del = isAdmin ? '<button class="delete-btn" onclick="deleteComment(' + idx + ',' + c.time + ')">🗑️</button>' : '';
            var repliesHTML = ''; if (c.replies && c.replies.length) { repliesHTML = c.replies.map(function(r) { return '<div class="reply-item"><b style="color:var(--gold)">' + r.username + '</b>: ' + r.text + '</div>'; }).join(''); }
            div.innerHTML = '<div><span class="comment-author">' + c.username + '</span><span class="comment-badge ' + bc + '">' + ct + '</span>' + del + '</div><div style="margin:5px 0">' + c.text + '</div><button style="background:rgba(0,0,0,0.05);border:none;color:var(--text2);cursor:pointer;padding:5px 12px;border-radius:15px;margin-right:5px" onclick="likeComment(' + idx + ',' + c.time + ')">❤️ ' + (c.likes || 0) + '</button><button style="background:rgba(0,0,0,0.05);border:none;color:var(--text2);cursor:pointer;padding:5px 12px;border-radius:15px" onclick="replyToComment(' + idx + ',' + c.time + ')">💬 Ответить</button>' + repliesHTML;
            list.appendChild(div);
        });
    }
    function likeComment(di, ct) { var c = votes[di].comments.find(function(x) { return x.time === ct; }); if (!c) return; if (!c.likedBy) c.likedBy = []; var i = c.likedBy.indexOf(currentUser); if (i === -1) { c.likedBy.push(currentUser); c.likes = (c.likes || 0) + 1; playSound('like'); } else { c.likedBy.splice(i, 1); c.likes = Math.max(0, c.likes - 1); } saveVotes(); renderComments(); }
    function deleteComment(di, ct) { if (!isAdmin) return; votes[di].comments = votes[di].comments.filter(function(c) { return c.time !== ct; }); saveVotes(); renderComments(); showToast('Удалено 🗑️'); }

    function nextDilemma() { currentIndex = (currentIndex + 1) % filtered.length; loadDilemma(); }
    function shareDilemma() { var d = filtered[currentIndex], t = '🎯 "' + d.q + '"\nА: ' + d.a + ' | Б: ' + d.b; if (navigator.share) navigator.share({ text: t }); else { navigator.clipboard.writeText(t); showToast('Скопировано!'); } }

    function showProfile() {
        document.getElementById('gameScreen').style.display = 'none'; document.getElementById('profileScreen').style.display = 'block';
        var tv = Object.keys(choices).length, tc = 0; Object.values(votes).forEach(function(v) { tc += v.comments.filter(function(c) { return c.username === currentUser; }).length; });
        var u = usersDB[currentUser]; var bestDuel = u && u.bestDuel ? u.bestDuel : 0;
        document.getElementById('profileContent').innerHTML = '<h3>' + currentUser + '</h3><div class="stat-card"><span class="stat-value">' + tv + '</span><br>Дилемм решено</div><div class="stat-card"><span class="stat-value">' + tc + '</span><br>Комментариев</div><div class="stat-card"><span class="stat-value">' + bestDuel + '</span><br>Рекорд дуэли</div>';
        document.getElementById('achievementsSection').style.display = 'none'; document.getElementById('showAchievementsBtn').textContent = '🏅 Показать достижения'; document.getElementById('showAchievementsBtn').style.display = 'block';
        if (!u.dailyActivity) u.dailyActivity = {};
        var days = Object.keys(u.dailyActivity).sort().slice(-7);
        var statsHTML = '<h4 style="margin-top:15px">📊 Активность за 7 дней</h4>';
        if (!days.length) statsHTML += '<p style="color:var(--text2)">Нет данных</p>';
        else { days.forEach(function(day) { statsHTML += '<div class="graph-bar"><span style="font-size:12px">' + day.slice(0,5) + '</span><div style="flex:1;background:rgba(0,0,0,0.05);border-radius:10px;height:16px"><div style="width:' + Math.min(u.dailyActivity[day] * 10, 100) + '%;height:100%;background:var(--side-a);border-radius:10px"></div></div><span style="font-size:12px">' + u.dailyActivity[day] + '</span></div>'; }); }
        document.getElementById('statsGraph').innerHTML = statsHTML;
        var logoutBtn = document.querySelector('#profileScreen .btn-b'); if (logoutBtn) logoutBtn.style.display = 'block';
    }

    function toggleAchievements() {
        var section = document.getElementById('achievementsSection'), btn = document.getElementById('showAchievementsBtn');
        if (section.style.display === 'none') {
            var u = usersDB[currentUser]; if (!u.achievements) u.achievements = [];
            var tv = Object.keys(choices).length, tc = 0; Object.values(votes).forEach(function(v) { tc += v.comments.filter(function(c) { return c.username === currentUser; }).length; });
            var allAch = [
                { id: 'first_vote', name: '🎯 Первый голос', check: function() { return tv >= 1; } },
                { id: '5_votes', name: '🗳️ 5 голосов', check: function() { return tv >= 5; } },
                { id: '10_votes', name: '🔥 10 голосов', check: function() { return tv >= 10; } },
                { id: 'first_comment', name: '💬 Первый комментарий', check: function() { return tc >= 1; } },
                { id: '5_comments', name: '📝 5 комментариев', check: function() { return tc >= 5; } },
                { id: 'daily', name: '📅 Дилемма дня', check: function() { return choices[dilemmas[getDailyIndex()].q] ? true : false; } },
                { id: 'duel_master', name: '⚔️ Мастер дуэли', check: function() { return (u.bestDuel || 0) >= 100; } },
                { id: 'creator', name: '👑 Создатель', check: function() { return currentUser === 'Nebo'; } },
            ];
            var html = '<h4 style="margin-top:15px">🏅 Достижения</h4>';
            allAch.forEach(function(a) { var earned = u.achievements.indexOf(a.id) !== -1 || a.check(); if (earned && u.achievements.indexOf(a.id) === -1) u.achievements.push(a.id); html += '<span class="achievement ' + (earned ? 'earned' : '') + '">' + a.name + '</span> '; });
            saveUsers(); section.innerHTML = html; section.style.display = 'block';
            btn.textContent = '🔼 Скрыть'; btn.style.background = 'var(--side-b)';
        } else { section.style.display = 'none'; btn.textContent = '🏅 Показать'; btn.style.background = 'var(--side-a)'; }
    }
    function closeProfile() { document.getElementById('profileScreen').style.display = 'none'; document.getElementById('gameScreen').style.display = 'block'; document.getElementById('showAchievementsBtn').style.display = 'block'; document.getElementById('showAchievementsBtn').textContent = '🏅 Показать достижения'; document.getElementById('showAchievementsBtn').style.background = 'var(--side-a)'; var logoutBtn = document.querySelector('#profileScreen .btn-b'); if (logoutBtn) logoutBtn.style.display = 'block'; }

    function updateTop() {
        var s = dilemmas.slice().sort(function(a, b) { var ta = votes[dilemmas.indexOf(a)] ? votes[dilemmas.indexOf(a)].A + votes[dilemmas.indexOf(a)].B : 0; var tb = votes[dilemmas.indexOf(b)] ? votes[dilemmas.indexOf(b)].A + votes[dilemmas.indexOf(b)].B : 0; return tb - ta; }).slice(0, 10);
        var h = '<h4 style="margin-top:20px;color:var(--gold)">🏆 Топ-10</h4>';
        s.forEach(function(d, i) { var idx = dilemmas.indexOf(d), tv = votes[idx] ? votes[idx].A + votes[idx].B : 0; h += '<div class="top-item"><span>#' + (i+1) + ' ' + d.q + '</span><span style="color:var(--gold)">' + tv + ' голосов</span></div>'; });
        document.getElementById('topSection').innerHTML = h;
    }

    function openCreate() { document.getElementById('gameScreen').style.display = 'none'; document.getElementById('createScreen').style.display = 'block'; }
    function closeCreate() { document.getElementById('createScreen').style.display = 'none'; document.getElementById('gameScreen').style.display = 'block'; }
    function createDilemma() { var q = document.getElementById('createQuestion').value.trim(), a = document.getElementById('createOptionA').value.trim(), b = document.getElementById('createOptionB').value.trim(), cat = document.getElementById('createCategory').value; if (!q || !a || !b) { document.getElementById('createError').textContent = 'Заполни все поля!'; return; } dilemmas.push({ q: q, a: a, b: b, cat: cat }); votes[dilemmas.length - 1] = { A: 0, B: 0, comments: [] }; saveVotes(); closeCreate(); filterCat(currentCat, document.querySelector('.cat-btn.active')); loadDilemma(); showToast('Дилемма создана! 🎉'); }

    function cycleLang() { var langs = ['ru','en','it'], flags = { ru:'🇷🇺', en:'🇬🇧', it:'🇮🇹' }, idx = langs.indexOf(localStorage.getItem('lang')||'ru'), next = (idx + 1) % 3; localStorage.setItem('lang', langs[next]); document.querySelectorAll('.lang-btn').forEach(function(b) { b.textContent = flags[langs[next]]; }); }

    document.addEventListener('keydown', function(e) {
        if (document.activeElement === document.getElementById('newCommentInput')) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addComment(); } return; }
        if (document.activeElement === document.getElementById('searchInput')) { if (e.key === 'Enter') { e.preventDefault(); document.getElementById('searchInput').blur(); } return; }
        if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') return;
        if (document.getElementById('gameScreen').style.display === 'none') return;
        if (e.key === 'Enter' || e.key === 'ArrowDown') { e.preventDefault(); nextDilemma(); }
        if (e.key === 'a' || e.key === 'A' || e.key === 'ArrowLeft') { e.preventDefault(); vote('A'); }

    });
